name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag (defaults to commit SHA)
        required: false
        type: string
  push:
    branches: [develop]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/educore-ai
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm build

      # TODO: add Dockerfiles per app and enable buildx push
      - name: Build container images (stub)
        run: |
          echo "Stub — build and push images to ${REGISTRY}/${IMAGE_PREFIX}"
          echo "  api-gateway:${IMAGE_TAG}"
          echo "  web-landing:${IMAGE_TAG}"
          echo "  web-school:${IMAGE_TAG}"
          echo "Next: docker buildx build --push for each app in apps/"

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # TODO: configure kubectl context via GitHub environment secrets
      - name: Deploy Kubernetes manifests (stub)
        run: |
          echo "Stub — apply infrastructure/k8s/ to staging cluster"
          echo "  kubectl apply -f infrastructure/k8s/namespace.yaml"
          echo "  kubectl apply -f infrastructure/k8s/secrets/"
          echo "  kubectl apply -f infrastructure/k8s/api-gateway.yaml"
          echo "  kubectl apply -f infrastructure/k8s/web-landing.yaml"
          echo "  kubectl apply -f infrastructure/k8s/web-school.yaml"
          echo "  kubectl apply -f infrastructure/k8s/ingress.yaml"
          echo "Ingress host: educore.local (see infrastructure/k8s/ingress.yaml)"

      - name: Smoke check (stub)
        run: |
          echo "Stub — curl staging health endpoints after deploy"
          echo "  GET https://api.staging.educore.ai/api/v1/health"
          echo "  GET https://staging.educore.ai/"
