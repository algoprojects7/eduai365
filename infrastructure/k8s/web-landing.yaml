apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-landing
  namespace: educore
  labels:
    app: web-landing
    app.kubernetes.io/name: web-landing
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-landing
  template:
    metadata:
      labels:
        app: web-landing
    spec:
      containers:
        - name: web-landing
          image: educore/web-landing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: http://api.educore.local
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-landing
  namespace: educore
  labels:
    app: web-landing
spec:
  type: ClusterIP
  selector:
    app: web-landing
  ports:
    - name: http
      port: 3000
      targetPort: http
