apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educore
  namespace: educore
  labels:
    app.kubernetes.io/name: educore-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: educore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-landing
                port:
                  number: 3000
    - host: school.educore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-school
                port:
                  number: 3002
    - host: api.educore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
