global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: api-gateway
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['host.docker.internal:4000']
    # Stub target — wire NestJS Prometheus exporter in production

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
