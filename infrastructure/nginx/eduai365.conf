# ═══════════════════════════════════════════════════════
# HTTP → HTTPS redirect
# ═══════════════════════════════════════════════════════
server {
    listen 80;
    server_name eduai365.com *.eduai365.com;
    return 301 https://$host$request_uri;
}

# ═══════════════════════════════════════════════════════
# Landing page — eduai365.com / www.eduai365.com
# ═══════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name eduai365.com www.eduai365.com;

    ssl_certificate     /etc/letsencrypt/live/eduai365.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduai365.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }
}

# ═══════════════════════════════════════════════════════
# Super Admin — superadmin.eduai365.com
# ═══════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name superadmin.eduai365.com;

    ssl_certificate     /etc/letsencrypt/live/eduai365.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduai365.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        include proxy_params;
    }
}

# ═══════════════════════════════════════════════════════
# API Gateway — api.eduai365.com
# ═══════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name api.eduai365.com;

    ssl_certificate     /etc/letsencrypt/live/eduai365.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduai365.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        include proxy_params;
        # WebSocket support for notifications
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ═══════════════════════════════════════════════════════
# School Subdomains — *.eduai365.com (wildcard catch-all)
# Path-based routing to role-specific apps
# ═══════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name *.eduai365.com;

    ssl_certificate     /etc/letsencrypt/live/eduai365.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduai365.com/privkey.pem;

    # Teacher portal (basePath=/teacher)
    location /teacher/ {
        proxy_pass http://127.0.0.1:3003;
        include proxy_params;
    }
    location /teacher {
        proxy_pass http://127.0.0.1:3003;
        include proxy_params;
    }

    # Student portal (basePath=/student)
    location /student/ {
        proxy_pass http://127.0.0.1:3004;
        include proxy_params;
    }
    location /student {
        proxy_pass http://127.0.0.1:3004;
        include proxy_params;
    }

    # Parent portal (basePath=/parent)
    location /parent/ {
        proxy_pass http://127.0.0.1:3005;
        include proxy_params;
    }
    location /parent {
        proxy_pass http://127.0.0.1:3005;
        include proxy_params;
    }

    # Everything else → school admin app (admin, HR, librarian, etc.)
    location / {
        proxy_pass http://127.0.0.1:3002;
        include proxy_params;
    }
}
