services:
  postgres:
    image: postgres:16-alpine
    container_name: educore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore_dev
      POSTGRES_DB: educore_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U educore -d educore_ai']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: educore-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: educore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: educore_minio
      MINIO_ROOT_PASSWORD: educore_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: educore-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 educore_minio educore_minio_secret;
      mc mb local/educore-assets --ignore-existing;
      mc anonymous set download local/educore-assets/public;
      exit 0;
      "

  loki:
    image: grafana/loki:3.0.0
    container_name: educore-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./infrastructure/docker/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # Optional observability stack — start with: docker compose --profile monitoring up -d
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.55.1
    container_name: educore-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.4.0
    container_name: educore-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    ports:
      - '3030:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: educore_grafana
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  loki_data:
  prometheus_data:
  grafana_data:
